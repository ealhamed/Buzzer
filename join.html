<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060C">
<title>BUZZER — Play</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="buzzer.js"></script>
<script src="themes.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--t-bg:#06060C;--t-s1:#0E0E18;--t-s2:#161624;--t-bdr:#222236;--t-txt:#E0E0F0;--t-dim:#8888A0;--t-primary:#00E5FF;--t-secondary:#FF3E6C;--t-green:#76FF03;--t-yellow:#FFD600;--t-orange:#FF9100;--t-btn-start-bg:linear-gradient(135deg,#00E5FF,#00B4D8);--t-btn-start-c:#06060C;--t-btn-reset-bg:linear-gradient(135deg,#FF3E6C,#D81B60);--t-btn-reset-c:#fff;--t-card-bg:#0E0E18;--t-card-bdr:#222236;--t-input-bg:#06060C;--t-buzz-glow:1;--t-logo-grad:linear-gradient(135deg,#00E5FF,#FF3E6C);--t-lock-color:#76FF03;--t-lock-bg:rgba(118,255,3,.05);--t-lock-bdr:rgba(118,255,3,.3);--t-penalty-color:#FF9100;--t-penalty-bg:rgba(255,145,0,.06);--t-penalty-bdr:rgba(255,145,0,.25);--t-mode:dark}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Barlow',sans-serif;font-weight:700;background:var(--t-bg);color:var(--t-txt);letter-spacing:.3px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(255,62,108,.03) 0%,transparent 50%);pointer-events:none}
main{position:relative;z-index:1;width:100%;max-width:480px;padding:env(safe-area-inset-top,8px) 14px env(safe-area-inset-bottom,8px) 14px;margin:0 auto;height:100%;display:flex;flex-direction:column}
.scr{display:none;width:100%;flex:1}.scr.on{display:flex;flex-direction:column}

/* Header */
.hbar{display:flex;align-items:center;padding:8px 12px;background:var(--t-card-bg);border:1px solid var(--t-card-bdr);border-radius:12px;gap:6px;flex-shrink:0}
.back-btn{min-width:40px;min-height:40px;background:var(--t-s2);border:1px solid var(--t-bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--t-dim);text-decoration:none;transition:all .2s;flex-shrink:0;font-weight:900}
.back-btn:hover,.back-btn:focus-visible{border-color:var(--t-primary);color:var(--t-primary);outline:none}
.hbar-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,24px);letter-spacing:4px;padding-right:4px;background:var(--t-logo-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#stdLogo{display:block}
#aldewaniahLogo{display:none;height:28px;object-fit:contain}
.share-btn{font-family:'Barlow',sans-serif;font-size:13px;font-weight:800;padding:8px 14px;border:1px solid var(--t-bdr);background:var(--t-s2);color:var(--t-dim);border-radius:10px;cursor:pointer;margin-left:auto;min-height:40px;letter-spacing:1px;white-space:nowrap}
.share-btn:hover{border-color:var(--t-primary);color:var(--t-primary)}
.player-qr{text-align:center;margin-top:6px;padding:12px;background:var(--t-card-bg);border:1px solid var(--t-card-bdr);border-radius:12px;display:none}
.player-qr canvas{border-radius:8px}
.player-qr-label{font-size:12px;color:var(--t-dim);margin-top:6px;font-weight:700;letter-spacing:1px}

/* Join form */
.jcard{background:var(--t-card-bg);border:1px solid var(--t-card-bdr);border-radius:18px;padding:clamp(24px,6vw,36px) clamp(20px,5vw,28px);margin:auto 0}
.flbl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:var(--t-dim);margin-bottom:6px}
.inp{width:100%;padding:clamp(14px,3.5vw,18px) 16px;font-family:'Barlow',sans-serif;font-size:clamp(18px,4.5vw,22px);font-weight:800;background:var(--t-input-bg);border:1px solid var(--t-bdr);border-radius:14px;color:var(--t-txt);outline:none;transition:border-color .2s;margin-bottom:14px;min-height:52px}
.inp:focus{border-color:var(--t-primary)}
.inp::placeholder{color:#444;font-weight:600}
.inp-code{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,36px);text-align:center;letter-spacing:12px;text-transform:uppercase}
.btn-join{width:100%;font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,26px);letter-spacing:5px;padding:clamp(16px,4vw,22px);border:2px solid var(--t-primary);background:transparent;color:var(--t-primary);border-radius:14px;cursor:pointer;transition:all .3s;min-height:56px}
.btn-join:hover,.btn-join:active,.btn-join:focus-visible{background:var(--t-primary);color:var(--t-bg);outline:none}
.btn-join:disabled{opacity:.35;cursor:wait}
.err{color:var(--t-secondary);font-size:15px;text-align:center;margin-top:8px;min-height:22px;font-weight:800}

/* Buzzer screen */
.bscr{justify-content:space-between}
.topbar{text-align:center;flex-shrink:0;padding:8px 0 2px}
.pname{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,7vw,36px);letter-spacing:4px;position:relative}
.pname::after{content:'✎';font-size:14px;position:absolute;right:-20px;top:2px;opacity:.3}
.pname-edit{display:flex;align-items:center;gap:6px;justify-content:center}
.rename-inp{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,6vw,30px);letter-spacing:3px;background:var(--t-input-bg);border:2px solid var(--t-primary);border-radius:10px;color:var(--t-txt);text-align:center;padding:6px 12px;outline:none;width:clamp(180px,50vw,240px);min-height:44px}
.rename-ok,.rename-cancel{font-size:20px;min-width:40px;min-height:40px;border-radius:8px;border:1px solid var(--t-bdr);background:var(--t-s2);color:var(--t-txt);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}
.rename-ok:hover{border-color:var(--t-green);color:var(--t-green)}
.rename-cancel:hover{border-color:var(--t-secondary);color:var(--t-secondary)}
.pteam{font-size:clamp(15px,4vw,20px);margin-top:2px;letter-spacing:2px;font-weight:800}
.status{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5.5vw,28px);letter-spacing:4px;margin-top:4px;min-height:32px}

/* Lobby toggle */
.lobby-toggle{width:100%;padding:12px;background:var(--t-card-bg);border:1px solid var(--t-card-bdr);border-radius:12px;color:var(--t-dim);font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .2s;flex-shrink:0;margin-top:6px;min-height:48px}
.lobby-toggle:hover,.lobby-toggle:focus-visible{border-color:var(--t-primary);color:var(--t-primary);outline:none}
.lobby-panel{display:none;background:var(--t-card-bg);border:1px solid var(--t-card-bdr);border-radius:0 0 12px 12px;border-top:none;padding:14px;flex-shrink:0;max-height:38vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.lobby-panel.open{display:block}
.lp{display:flex;align-items:center;gap:8px;padding:8px;font-size:15px;border-radius:8px;font-weight:700;min-height:40px}
.lp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lp-name{flex:1;font-weight:800}
.lp-team-badge{font-size:12px;padding:3px 8px;border-radius:8px;font-weight:800}
.lp-idle{font-size:12px;color:var(--t-orange);font-weight:800}
.lp-you{font-size:12px;color:var(--t-primary);font-weight:900}
.team-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--t-bdr)}
.team-hd{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--t-dim);margin-bottom:8px}
.team-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.team-join-btn{font-size:16px;padding:10px 16px;border-radius:12px;border:1px solid var(--t-bdr);background:var(--t-s2);color:var(--t-txt);cursor:pointer;font-family:'Barlow',sans-serif;font-weight:800;transition:all .15s;display:flex;align-items:center;gap:7px;min-height:44px}
.team-join-btn:hover,.team-join-btn:focus-visible{border-color:var(--t-primary);outline:none}
.team-join-btn.active{border-color:var(--t-green);color:var(--t-green)}
.team-join-btn .tdot{width:10px;height:10px;border-radius:50%}
.leave-btn{font-size:14px;padding:8px 14px;border:1px solid var(--t-bdr);background:transparent;color:var(--t-dim);border-radius:8px;cursor:pointer;font-weight:800;min-height:40px}
.leave-btn:hover,.leave-btn:focus-visible{border-color:var(--t-secondary);color:var(--t-secondary);outline:none}
.ct-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.ct-inp{flex:1;padding:10px 14px;font-family:'Barlow',sans-serif;font-size:16px;font-weight:700;background:var(--t-input-bg);border:1px solid var(--t-bdr);border-radius:10px;color:var(--t-txt);outline:none;min-height:44px}
.ct-inp:focus{border-color:var(--t-primary)}
.ct-colors{display:flex;gap:6px;align-items:center}
.ct-color{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.ct-color:focus-visible{outline:2px solid #fff;outline-offset:2px}
.ct-color.sel{border-color:#fff;transform:scale(1.15)}
.ct-go{font-family:'Bebas Neue',sans-serif;font-size:20px;padding:8px 18px;border:1px solid var(--t-primary);background:transparent;color:var(--t-primary);border-radius:10px;cursor:pointer;letter-spacing:2px;transition:all .2s;min-height:44px}
.ct-go:hover,.ct-go:focus-visible{background:var(--t-primary);color:var(--t-bg);outline:none}

/* The buzzer */
.bwrap{display:flex;align-items:center;justify-content:center;flex:1;min-height:0}
.bbtn{width:min(280px,68vw);height:min(280px,68vw);border-radius:50%;border:none;cursor:pointer;position:relative;transition:all .12s;-webkit-tap-highlight-color:transparent;outline:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bbtn:focus-visible{outline:3px solid #fff;outline-offset:4px}
.bbtn .bt{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,9vw,42px);letter-spacing:6px;color:var(--t-bg);position:relative;z-index:2;pointer-events:none}
.bbtn::after{content:'';position:absolute;inset:5px;border-radius:50%;border:3px solid rgba(255,255,255,.08);pointer-events:none}
.bbtn.wait{opacity:.1;transform:scale(.82);pointer-events:none}
.bbtn.wait .bt{font-size:clamp(14px,4vw,18px);letter-spacing:3px}
.bbtn.armed{animation:breathe 1.3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.bbtn.armed:active{transform:scale(.86)!important;animation:none}
.bbtn.done{animation:none;transform:scale(.88);opacity:.45;pointer-events:none}
.bbtn.penalty{animation:penFlash .5s ease-in-out infinite}
@keyframes penFlash{0%,100%{opacity:.25}50%{opacity:.1}}

.res{text-align:center;min-height:clamp(60px,14vw,80px);flex-shrink:0;padding-bottom:8px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.res-ord{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,12vw,64px)}
.res-gap{font-size:16px;color:var(--t-dim);letter-spacing:2px;margin-top:2px;font-weight:800}
.res-pen{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,7vw,36px);color:var(--t-orange)}
.res-who{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,26px)}

/* Celebration animation */
.celebrate{position:fixed;inset:0;pointer-events:none;z-index:800;overflow:hidden}
.celebrate .burst{position:absolute;top:50%;left:50%;width:200vw;height:200vw;margin:-100vw 0 0 -100vw;border-radius:50%;animation:burstOut .8s ease-out forwards;opacity:0}
@keyframes burstOut{0%{transform:scale(0);opacity:.4}100%{transform:scale(1);opacity:0}}
.celebrate .star{position:absolute;font-size:clamp(20px,6vw,32px);animation:starFly 1.2s ease-out forwards;opacity:0}
@keyframes starFly{0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}60%{opacity:1}100%{transform:translate(var(--tx,20vw),var(--ty,-20vh)) scale(1.2) rotate(360deg);opacity:0}}
.celebrate .ring{position:absolute;top:50%;left:50%;border-radius:50%;border:3px solid;animation:ringGrow 1s ease-out forwards;opacity:0}
@keyframes ringGrow{0%{width:0;height:0;margin:0;opacity:.8}100%{width:120vw;height:120vw;margin:-60vw 0 0 -60vw;opacity:0}}

.overlay{position:fixed;inset:0;background:var(--t-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:24px}
.overlay-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:6px;background:var(--t-logo-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.overlay-t{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--t-secondary);letter-spacing:3px}
.overlay-sub{font-size:15px;color:var(--t-dim);margin-top:12px;font-weight:700}

/* Player QR overlay */
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(6,6,12,.95);z-index:500;align-items:center;justify-content:center;flex-direction:column}
.qr-overlay.on{display:flex}
.qr-card{background:var(--t-s1);border:1px solid var(--t-bdr);border-radius:20px;padding:24px;text-align:center}
.qr-url{font-size:12px;color:var(--t-dim);word-break:break-all;padding:8px;background:var(--t-bg);border-radius:8px;margin-top:10px;font-family:monospace;font-weight:600;max-width:300px}
.qr-close{margin-top:16px;font-family:'Bebas Neue',sans-serif;font-size:18px;padding:12px 36px;border:1px solid var(--t-bdr);background:transparent;color:var(--t-dim);border-radius:12px;cursor:pointer;letter-spacing:3px;min-height:48px}
.qr-close:hover{border-color:var(--t-primary);color:var(--t-primary)}
.copy-btn{font-family:'Bebas Neue',sans-serif;font-size:15px;padding:8px 14px;border:1px solid var(--t-primary);background:transparent;color:var(--t-primary);border-radius:8px;cursor:pointer;letter-spacing:2px;white-space:nowrap;min-height:38px;transition:all .2s}
.copy-btn:hover{background:var(--t-primary);color:var(--t-bg)}
.copy-btn.copied{border-color:var(--t-green);color:var(--t-green)}

/* Player settings panel */
.ps-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600}.ps-overlay.on{display:block}
.ps-panel{position:fixed;top:0;right:-300px;width:min(300px,82vw);height:100%;background:var(--t-bg);border-left:1px solid var(--t-bdr);z-index:700;transition:right .3s;overflow-y:auto;padding:env(safe-area-inset-top,16px) 16px 80px 16px}
.ps-panel.on{right:0}
.ps-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ps-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--t-primary)}
.ps-close{min-width:40px;min-height:40px;background:var(--t-s2);border:1px solid var(--t-bdr);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t-dim);font-size:20px;font-weight:900}
.ps-close:hover{border-color:var(--t-secondary);color:var(--t-secondary)}
.ps-group{margin-bottom:16px}
.ps-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--t-bdr);font-size:15px;font-weight:800;cursor:pointer;min-height:48px}
.ps-toggle-row input{display:none}
.ps-switch{width:44px;height:24px;background:var(--t-s2);border-radius:12px;position:relative;transition:background .2s;flex-shrink:0}
.ps-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:var(--t-dim);border-radius:50%;transition:all .2s}
.ps-toggle-row input:checked+.ps-switch{background:var(--t-primary)}
.ps-toggle-row input:checked+.ps-switch::after{left:22px;background:#fff}
</style>
</head>
<body>

<!-- Player QR Share Overlay -->
<div class="qr-overlay" id="pQrOverlay">
  <div class="qr-card"><div id="pQrBox" style="width:180px;height:180px;margin:0 auto"></div><div style="display:flex;align-items:center;gap:6px;margin-top:10px"><div class="qr-url" id="pQrUrl" style="flex:1;margin:0"></div><button class="copy-btn" id="pCopyBtn" onclick="copyPlayerLink()">COPY</button></div></div>
  <button class="qr-close" onclick="closePQR()">CLOSE</button>
</div>

<!-- Player Settings Overlay -->
<div class="ps-overlay" id="psOverlay" onclick="closePS()"></div>
<div class="ps-panel glass-target" id="psPanel">
  <div class="ps-hd"><span class="ps-title">SETTINGS</span><button class="ps-close" onclick="closePS()">✕</button></div>
  <div class="ps-group">
    <label class="ps-toggle-row"><span>Sound effects</span><input type="checkbox" id="pSndToggle" checked onchange="pSndOn=this.checked"><span class="ps-switch"></span></label>
  </div>
</div>

<main>
  <header>
    <div class="hbar glass-target">
      <a href="index.html" class="back-btn" aria-label="Back to home">←</a>
      <div class="hbar-logo" id="stdLogo">BUZZER</div>
      <img id="aldewaniahLogo" src="aldewaniah-logo.png" alt="الديوانية" style="display:none;height:28px;object-fit:contain">
      <button class="share-btn" id="shareBtn" onclick="openPQR()" style="display:none" aria-label="Share room"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> SHARE</button>
      <button class="share-btn" id="settingsBtn" onclick="openPS()" style="display:none" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="scr on" id="scrJoin">
    <form class="jcard glass-target" onsubmit="doJoin();return false;" novalidate>
      <div class="flbl">YOUR NAME</div>
      <input class="inp" id="inpName" type="text" placeholder="Enter name" maxlength="20" autocomplete="off" required aria-label="Your name">
      <div class="flbl">ROOM CODE</div>
      <input class="inp inp-code" id="inpCode" type="text" placeholder="XXXX" maxlength="4" autocomplete="off" required aria-label="Room code">
      <button class="btn-join" id="btnJoin" type="submit">JOIN</button>
      <div class="err" id="errMsg" role="alert"></div>
    </form>
  </div>

  <div class="scr bscr" id="scrBuzz">
    <section class="topbar" aria-label="Player info">
      <div class="pname" id="pName" onclick="startRename()" style="cursor:pointer" title="Tap to change name"></div>
      <div class="pname-edit" id="pNameEdit" style="display:none">
        <input class="rename-inp" id="renameInp" maxlength="20" aria-label="New name">
        <button class="rename-ok" onclick="confirmRename()">✓</button>
        <button class="rename-cancel" onclick="cancelRename()">✕</button>
      </div>
      <div class="pteam" id="pTeam"></div>
      <div class="status" id="stTxt" role="status" aria-live="polite">WAITING FOR HOST…</div>
    </section>

    <button class="lobby-toggle" id="lobbyToggle" onclick="toggleLobby()" aria-expanded="false" aria-controls="lobbyPanel">▼ LOBBY (0)</button>
    <div class="lobby-panel glass-target" id="lobbyPanel" role="region" aria-label="Game lobby">
      <div id="lobbyList"></div>
      <div class="team-section" id="teamSection">
        <div class="team-hd">TEAMS</div>
        <div class="team-btns" id="teamBtns" role="group" aria-label="Teams"></div>
        <div class="ct-row" id="ctRow">
          <input class="ct-inp" id="ctName" placeholder="New team name" maxlength="16" aria-label="New team name">
          <div class="ct-colors" id="ctColors" role="group" aria-label="Team color"></div>
          <button class="ct-go" onclick="createTeam()" aria-label="Create team">+</button>
        </div>
      </div>
    </div>

    <div class="bwrap">
      <button class="bbtn wait" id="buzzBtn" onclick="doBuzz()" disabled aria-label="Buzz button — waiting">
        <span class="bt">WAIT</span>
      </button>
    </div>
    <div class="res" id="resArea" role="status" aria-live="polite"></div>
  </div>
</main>

<script>
let player=null,state='idle',myColor='#00E5FF',myTeam=null;
let lobbyOpen=false,teamsData=[],playersData=[],teamsLocked=false;
let penaltyTimer=null,selColorIdx=0,currentRoomCode='';
let pSndOn=true;
const TEAM_COLORS=[{name:'Crimson',hex:'#FF3E6C'},{name:'Cyan',hex:'#00E5FF'},{name:'Lime',hex:'#76FF03'},{name:'Amber',hex:'#FFD600'}];
const params=new URLSearchParams(location.search);
const urlRoom=params.get('room')||'';
const savedRoom=localStorage.getItem('bzr_last_room')||'';
const savedName=localStorage.getItem('bzr_last_name')||'';
if(urlRoom)document.getElementById('inpCode').value=urlRoom;
else if(savedRoom)document.getElementById('inpCode').value=savedRoom;
if(savedName)document.getElementById('inpName').value=savedName;

// Gated sound
function pSound(key){if(pSndOn)playSound(key);}

// QR overlay for sharing
function openPQR(){
  const url=window.location.href.split('?')[0]+'?room='+currentRoomCode;
  document.getElementById('pQrUrl').textContent=url;
  const qb=document.getElementById('pQrBox');qb.innerHTML='';
  new QRCode(qb,{text:url,width:160,height:160,colorDark:'#00E5FF',colorLight:'#06060C',correctLevel:QRCode.CorrectLevel.M});
  document.getElementById('pQrOverlay').classList.add('on');
}
function closePQR(){document.getElementById('pQrOverlay').classList.remove('on');}
function copyPlayerLink(){
  const url=document.getElementById('pQrUrl').textContent;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById('pCopyBtn');btn.textContent='COPIED!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('copied');},2000);
  }).catch(()=>{showToast('Copy failed','error');});
}

// Player settings panel
function openPS(){document.getElementById('psPanel').classList.add('on');document.getElementById('psOverlay').classList.add('on');}
function closePS(){document.getElementById('psPanel').classList.remove('on');document.getElementById('psOverlay').classList.remove('on');}
function renderColorPicks(){document.getElementById('ctColors').innerHTML=TEAM_COLORS.map((c,i)=>'<div class="ct-color '+(i===selColorIdx?'sel':'')+'" style="background:'+c.hex+'" onclick="selColorIdx='+i+';renderColorPicks()" tabindex="0" role="radio" aria-checked="'+(i===selColorIdx)+'" aria-label="'+c.name+'"></div>').join('');}
renderColorPicks();

// Keyboard: spacebar to buzz
document.addEventListener('keydown',e=>{
  if(e.key===' '&&state==='armed'){e.preventDefault();doBuzz();}
});

function doJoin(){
  const name=document.getElementById('inpName').value.trim();
  const code=document.getElementById('inpCode').value.trim().toUpperCase();
  if(!name){document.getElementById('errMsg').textContent='Enter your name';return;}
  if(!code||code.length!==4){document.getElementById('errMsg').textContent='Enter 4-character room code';return;}
  // Save for auto-remember
  localStorage.setItem('bzr_last_room',code);
  localStorage.setItem('bzr_last_name',name);
  currentRoomCode=code;
  const btn=document.getElementById('btnJoin');btn.disabled=true;btn.textContent='CONNECTING…';
  document.getElementById('errMsg').textContent='';
  player=new BuzzerPlayer(onPlayerUpdate);
  player.join(code,name).then(info=>{
    myColor=info.color;if(info.teams)teamsData=info.teams;if(info.teamsLocked!=null)teamsLocked=info.teamsLocked;
    if(info.rejoined&&info.team)myTeam=info.team;if(info.theme)applyTheme(info.theme);
    showBuzzer(info.name,info.color);
    document.getElementById('shareBtn').style.display='flex';
    document.getElementById('settingsBtn').style.display='flex';
  }).catch(e=>{document.getElementById('errMsg').textContent=e.message||'Failed';btn.disabled=false;btn.textContent='JOIN';});
}
function showBuzzer(name,color){
  document.getElementById('scrJoin').classList.remove('on');document.getElementById('scrBuzz').classList.add('on');
  document.getElementById('pName').textContent=name.toUpperCase();document.getElementById('pName').style.color=color;document.getElementById('pName').style.textShadow='0 0 14px '+color;
  updateTeamDisplay();setIdle();
}
function onPlayerUpdate(msg){
  switch(msg.type){
    case'round_armed':setArmed();break;case'round_reset':setIdle();break;
    case'clear_all_penalties':if(penaltyTimer){clearInterval(penaltyTimer);penaltyTimer=null;}state='idle';break;
    case'first_buzz':if(state==='armed'){pSound('lock');setLocked(msg.name,msg.color,msg.team);}break;
    case'buzz_confirmed':pSound('click');setBuzzed(msg.order,msg.gap);break;
    case'penalty':setPenalty(msg.seconds);break;case'penalty_active':setPenalty(msg.remaining);break;
    case'team_penalized':if(myTeam===msg.teamId)setPenalty(msg.seconds);break;
    case'player_penalized':if(player&&msg.playerId===player.myId)setPenalty(msg.seconds);break;
    case'timer_expired':pSound('timeup');showToast('Time up!','warning');break;
    case'correct':onCorrect(msg);break;
    case'lobby':playersData=msg.players||[];teamsData=msg.teams||[];teamsLocked=msg.teamsLocked||false;renderLobby();break;
    case'teams_locked':teamsLocked=true;renderLobby();break;case'teams_unlocked':teamsLocked=false;renderLobby();break;
    case'theme_change':if(msg.theme)applyTheme(msg.theme);break;
    case'kicked':showOverlay('REMOVED FROM ROOM');break;case'disconnected':showOverlay('DISCONNECTED','Refresh to reconnect');break;
    case'error':if(state==='idle')document.getElementById('errMsg').textContent=msg.message;break;
  }
}
function renderLobby(){
  document.getElementById('lobbyToggle').textContent=(lobbyOpen?'▲':'▼')+' LOBBY ('+playersData.length+')';
  const teamMap=new Map();teamsData.forEach(t=>teamMap.set(t.id,t));
  document.getElementById('lobbyList').innerHTML=playersData.map(p=>{
    const isMe=player&&p.id===player.myId;const tm=p.team&&teamMap.has(p.team)?'<span class="lp-team-badge" style="background:'+teamMap.get(p.team).color+'22;color:'+teamMap.get(p.team).color+'">'+esc(teamMap.get(p.team).name)+'</span>':'';
    return '<div class="lp" style="opacity:'+(p.idle?.4:1)+'"><div class="lp-dot" style="background:'+p.color+'"></div><div class="lp-name">'+esc(p.name)+'</div>'+tm+(p.idle?'<span class="lp-idle">IDLE</span>':'')+(isMe?'<span class="lp-you">YOU</span>':'')+'</div>';
  }).join('');
  const myT=myTeam;
  let thtml=teamsData.map(t=>{const active=myT===t.id;return '<button class="team-join-btn '+(active?'active':'')+'" onclick="'+(active?'leaveMyTeam()':'joinT(\''+t.id+'\')')+'" '+(teamsLocked&&!active?'disabled':'')+' aria-label="'+(active?'Leave':'Join')+' '+esc(t.name)+'"><div class="tdot" style="background:'+t.color+'"></div>'+esc(t.name)+(active?' ✓':'')+'</button>';}).join('');
  if(myT&&!teamsLocked)thtml+='<button class="leave-btn" onclick="leaveMyTeam()" aria-label="Leave team">Leave team</button>';
  document.getElementById('teamBtns').innerHTML=thtml||'<span style="font-size:14px;color:var(--t-dim)">No teams yet</span>';
  document.getElementById('ctRow').style.display=(teamsLocked||teamsData.length>=4)?'none':'flex';
  updateTeamDisplay();
  if(player&&player.myId){const me=playersData.find(p=>p.id===player.myId);if(me&&me.team)myTeam=me.team;}
}
function toggleLobby(){lobbyOpen=!lobbyOpen;document.getElementById('lobbyPanel').classList.toggle('open',lobbyOpen);document.getElementById('lobbyToggle').setAttribute('aria-expanded',lobbyOpen);document.getElementById('lobbyToggle').textContent=(lobbyOpen?'▲':'▼')+' LOBBY ('+playersData.length+')';}
function joinT(tid){if(teamsLocked)return;player.joinTeam(tid);myTeam=tid;renderLobby();}
function leaveMyTeam(){if(teamsLocked)return;player.leaveTeam();myTeam=null;renderLobby();}
function createTeam(){if(teamsLocked||teamsData.length>=4)return;const name=document.getElementById('ctName').value.trim();if(!name)return;player.createTeam(name,selColorIdx);document.getElementById('ctName').value='';myTeam='pending';}
function updateTeamDisplay(){const el=document.getElementById('pTeam');if(myTeam&&myTeam!=='pending'){const t=teamsData.find(t=>t.id===myTeam);if(t){el.textContent=t.name.toUpperCase();el.style.color=t.color;}else el.textContent='';}else el.textContent='';}

function setIdle(){if(penaltyTimer){state='penalty';return;}state='idle';const b=document.getElementById('buzzBtn');b.className='bbtn wait';b.disabled=true;b.querySelector('.bt').textContent='WAIT';b.style.background='radial-gradient(circle at 35% 35%,#333,#222,#181818)';b.style.boxShadow='none';b.setAttribute('aria-label','Buzz button — waiting');document.getElementById('stTxt').textContent='WAITING FOR HOST…';document.getElementById('stTxt').style.color='var(--t-dim)';document.getElementById('resArea').innerHTML='';}
function setArmed(){if(penaltyTimer)return;state='armed';const b=document.getElementById('buzzBtn');b.className='bbtn armed';b.disabled=false;b.querySelector('.bt').textContent='BUZZ!';b.style.background='radial-gradient(circle at 35% 35%,'+lighten(myColor,30)+','+myColor+','+darken(myColor,40)+')';b.style.boxShadow='0 0 50px '+myColor+'40';b.setAttribute('aria-label','Buzz now! Press or hit spacebar');document.getElementById('stTxt').textContent='GO!';document.getElementById('stTxt').style.color=myColor;document.getElementById('resArea').innerHTML='';pSound('arm');showToast('Round started — BUZZ!','info');}
function setBuzzed(order,gap){state='buzzed';const b=document.getElementById('buzzBtn');b.className='bbtn done';b.disabled=true;b.querySelector('.bt').textContent='#'+order;b.setAttribute('aria-label','Position '+order);if(order===1){document.getElementById('stTxt').textContent='🏆 FIRST!';document.getElementById('stTxt').style.color=myColor;document.getElementById('resArea').innerHTML='<div class="res-ord" style="color:'+myColor+'">🏆 #1</div>';showToast('You were FIRST!','success');}else{document.getElementById('stTxt').textContent='#'+order;document.getElementById('stTxt').style.color='var(--t-dim)';document.getElementById('resArea').innerHTML='<div class="res-ord" style="color:'+myColor+'">#'+order+'</div><div class="res-gap">+'+gap+'ms behind</div>';showToast('#'+order+' — '+gap+'ms behind','warning');}}
function setLocked(firstName,firstColor,firstTeam){if(state!=='armed')return;state='locked';const b=document.getElementById('buzzBtn');b.className='bbtn done';b.disabled=true;b.querySelector('.bt').textContent='✕';b.style.background='radial-gradient(circle at 35% 35%,#333,#222,#181818)';b.style.boxShadow='none';b.setAttribute('aria-label','Locked — '+firstName+' was first');document.getElementById('stTxt').textContent='LOCKED OUT';document.getElementById('stTxt').style.color='var(--t-secondary)';const teamInfo=firstTeam&&teamsData.find(t=>t.id===firstTeam);const teamStr=teamInfo?' <span style="font-size:.7em;color:'+teamInfo.color+'">'+esc(teamInfo.name)+'</span>':'';document.getElementById('resArea').innerHTML='<div class="res-who" style="color:'+firstColor+'">'+esc(firstName)+' was first'+teamStr+'</div>';}
function setPenalty(seconds){pSound('penalty');const b=document.getElementById('buzzBtn');b.className='bbtn penalty';b.disabled=true;b.querySelector('.bt').textContent='⚠';b.style.background='radial-gradient(circle at 35% 35%,#553300,#332200,#221100)';b.style.boxShadow='0 0 30px rgba(255,145,0,.1)';b.setAttribute('aria-label','Penalty — '+seconds+'s');document.getElementById('stTxt').textContent='PENALTY';document.getElementById('stTxt').style.color='var(--t-orange)';let rem=seconds;document.getElementById('resArea').innerHTML='<div class="res-pen" id="penCd">'+rem+'</div>';if(penaltyTimer)clearInterval(penaltyTimer);penaltyTimer=setInterval(()=>{rem--;const el=document.getElementById('penCd');if(el)el.textContent=rem;if(rem<=0){clearInterval(penaltyTimer);penaltyTimer=null;setArmed();}},1000);state='penalty';}
function doBuzz(){if(!player)return;if(lobbyOpen)toggleLobby();player.buzz();}

function onCorrect(msg){
  const isMe=player&&msg.playerId===player.myId;
  if(isMe){
    // I got it right — celebrate!
    pSound('buzz');
    document.getElementById('stTxt').textContent='✓ CORRECT!';
    document.getElementById('stTxt').style.color='var(--t-green)';
    document.getElementById('resArea').innerHTML='<div class="res-ord" style="color:var(--t-green)">🏆 ✓</div>';
    const b=document.getElementById('buzzBtn');
    b.className='bbtn done';b.disabled=true;
    b.querySelector('.bt').textContent='✓';
    b.style.background='radial-gradient(circle at 35% 35%,#2a5a2a,#1a4a1a,#0a3a0a)';
    b.style.boxShadow='0 0 60px rgba(0,255,102,.3)';
    showCelebration(myColor);
    showToast('YOU GOT IT RIGHT!','success');
  } else {
    // Someone else got it right
    document.getElementById('stTxt').textContent='✓ '+esc(msg.name).toUpperCase();
    document.getElementById('stTxt').style.color=msg.color;
    document.getElementById('resArea').innerHTML='<div class="res-who" style="color:'+msg.color+'">'+esc(msg.name)+' got it right</div>';
    showToast(msg.name+' answered correctly','info');
  }
}

function showCelebration(color){
  const el=document.createElement('div');el.className='celebrate';
  // Burst
  const burst=document.createElement('div');burst.className='burst';
  burst.style.background='radial-gradient(circle,'+color+'40,'+color+'10,transparent)';
  el.appendChild(burst);
  // Rings
  for(let i=0;i<3;i++){const r=document.createElement('div');r.className='ring';r.style.borderColor=color;r.style.animationDelay=(i*0.2)+'s';el.appendChild(r);}
  // Stars
  const emojis=['⭐','🏆','✓','💥','🔥','✨'];
  for(let i=0;i<14;i++){
    const s=document.createElement('div');s.className='star';
    s.textContent=emojis[i%emojis.length];
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*40;
    const tx=Math.cos(angle)*dist+'vw';
    const ty=Math.sin(angle)*dist+'vh';
    s.style.top='50%';s.style.left='50%';
    s.style.animation='starFly '+(0.8+Math.random()*0.6)+'s ease-out forwards';
    s.style.animationDelay=(Math.random()*0.3)+'s';
    s.style.setProperty('--tx',tx);s.style.setProperty('--ty',ty);
    el.appendChild(s);
  }
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}
function showOverlay(msg,sub){const o=document.createElement('div');o.className='overlay';o.setAttribute('role','alert');o.innerHTML='<div class="overlay-logo">BUZZER</div><div class="overlay-t">'+msg+'</div>'+(sub?'<div class="overlay-sub">'+sub+'</div>':'');document.body.appendChild(o);}

// Rename
function startRename(){
  document.getElementById('pName').style.display='none';
  document.getElementById('pNameEdit').style.display='flex';
  const inp=document.getElementById('renameInp');
  inp.value=player?player.myName:'';inp.focus();inp.select();
}
function confirmRename(){
  const name=document.getElementById('renameInp').value.trim();
  if(name&&player){
    player.rename(name);
    document.getElementById('pName').textContent=name.toUpperCase();
    document.getElementById('pName').style.color=myColor;
    showToast('Name changed to '+name,'success');
  }
  cancelRename();
}
function cancelRename(){
  document.getElementById('pNameEdit').style.display='none';
  document.getElementById('pName').style.display='block';
}
document.getElementById('renameInp').addEventListener('keyup',e=>{if(e.key==='Enter')confirmRename();if(e.key==='Escape')cancelRename();});

// Share room — opens QR overlay (same as host experience)
function shareRoom(){openPQR();}

// Keyboard: escape closes overlays
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closePQR();closePS();}
});

document.getElementById('inpName').addEventListener('keyup',e=>{if(e.key==='Enter')document.getElementById('inpCode').focus();});
document.getElementById('ctName').addEventListener('keyup',e=>{if(e.key==='Enter')createTeam();});
document.getElementById('inpName').focus();
</script>
