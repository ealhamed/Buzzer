<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06060C">
<link rel="manifest" href="manifest.json">
<title>BUZZER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Barlow',sans-serif;font-weight:700;background:#06060C;color:#E8E8F0;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(0,229,255,.06) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(255,62,108,.04) 0%,transparent 55%);pointer-events:none}
main{position:relative;z-index:1;text-align:center;padding:24px;width:100%;max-width:460px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,16vw,88px);letter-spacing:clamp(10px,3vw,18px);padding-right:18px;background:linear-gradient(135deg,#00E5FF 0%,#76FF03 40%,#FF3E6C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 4s ease-in-out infinite alternate;line-height:1}
@keyframes glow{0%{filter:brightness(1) drop-shadow(0 0 8px rgba(0,229,255,.3))}100%{filter:brightness(1.1) drop-shadow(0 0 16px rgba(255,62,108,.3))}}
.tag{font-family:'Bebas Neue',sans-serif;font-size:clamp(14px,3.5vw,18px);color:#9090A8;letter-spacing:8px;margin:6px 0 clamp(40px,10vw,60px)}
nav{display:flex;flex-direction:column;gap:16px}
.b{display:block;text-decoration:none;font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,5vw,26px);letter-spacing:6px;padding:clamp(18px,4.5vw,24px);border-radius:16px;text-align:center;transition:all .3s cubic-bezier(.34,1.56,.64,1);min-height:60px;display:flex;align-items:center;justify-content:center}
.bh{border:2px solid #00E5FF;color:#00E5FF;background:rgba(0,229,255,.04)}
.bh:hover,.bh:focus-visible{background:#00E5FF;color:#06060C;transform:scale(1.03);outline:none}
.bj{border:2px solid #FF3E6C;color:#FF3E6C;background:rgba(255,62,108,.04)}
.bj:hover,.bj:focus-visible{background:#FF3E6C;color:#06060C;transform:scale(1.03);outline:none}
footer{margin-top:clamp(40px,10vw,60px);font-size:clamp(12px,3vw,14px);color:#8888A0;letter-spacing:3px;line-height:2;font-weight:800}
.install-btn{display:none;margin-top:16px;font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;padding:12px 24px;border:1px solid #444;background:rgba(255,255,255,.04);color:#9090A8;border-radius:12px;cursor:pointer;min-height:48px}
.install-btn:hover{border-color:#666;color:#ccc}
main>*{opacity:0;transform:translateY(16px);animation:fu .6s ease forwards}
main>*:nth-child(1){animation-delay:.1s}main>*:nth-child(2){animation-delay:.2s}main>*:nth-child(3){animation-delay:.35s}main>*:nth-child(4){animation-delay:.55s}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<main>
  <h1>BUZZER</h1>
  <p class="tag">REAL-TIME GAME BUZZER</p>
  <nav aria-label="Main">
    <a href="host.html" class="b bh" role="button">⚡ HOST GAME</a>
    <a href="join.html" class="b bj" role="button">🎮 JOIN GAME</a>
    <button class="install-btn" id="installBtn" onclick="installPWA()" aria-label="Install app">📲 INSTALL APP</button>
  </nav>
  <footer>PEER-TO-PEER · UP TO 16 PLAYERS<br>TEAMS · 4 THEMES · LATENCY CORRECTION</footer>
</main>
<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='block';});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBtn').style.display='none';});}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
