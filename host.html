<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06060C">
<title>BUZZER — Host</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="buzzer.js"></script>
<script src="themes.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--t-bg:#06060C;--t-s1:#0E0E18;--t-s2:#161624;--t-bdr:#222236;--t-txt:#E0E0F0;--t-dim:#8888A0;--t-primary:#00E5FF;--t-secondary:#FF3E6C;--t-green:#76FF03;--t-yellow:#FFD600;--t-orange:#FF9100;--t-btn-start-bg:linear-gradient(135deg,#00E5FF,#00B4D8);--t-btn-start-c:#06060C;--t-btn-reset-bg:linear-gradient(135deg,#FF3E6C,#D81B60);--t-btn-reset-c:#ffffff;--t-card-bg:#0E0E18;--t-card-bdr:#222236;--t-input-bg:#06060C;--t-buzz-glow:1;--t-logo-grad:linear-gradient(135deg,#00E5FF,#FF3E6C);--t-lock-color:#76FF03;--t-lock-bg:rgba(118,255,3,0.05);--t-lock-bdr:rgba(118,255,3,0.3);--t-penalty-color:#FF9100;--t-penalty-bg:rgba(255,145,0,0.06);--t-penalty-bdr:rgba(255,145,0,0.25);--t-mode:dark}
html,body{height:100%}
body{font-family:'Rajdhani',sans-serif;background:var(--t-bg);color:var(--t-txt);overflow-x:hidden;-webkit-overflow-scrolling:touch}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(255,62,108,.03) 0%,transparent 50%);pointer-events:none}
main{position:relative;z-index:1;padding:10px;max-width:520px;margin:0 auto;padding-bottom:90px}
.scr{display:none}.scr.on{display:block}

/* Header bar */
.hbar{display:flex;align-items:center;padding:8px 12px;background:var(--t-s1);border-radius:12px;gap:6px}
.back-btn{width:34px;height:34px;background:var(--t-s2);border:1px solid var(--t-bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--t-dim);text-decoration:none;transition:all .2s;flex-shrink:0}
.back-btn:hover,.back-btn:focus-visible{border-color:var(--t-primary);color:var(--t-primary);outline:none}
.hbar-logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:3px;padding-right:3px;background:linear-gradient(135deg,var(--t-primary),var(--t-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hbar-code{margin-left:auto;font-family:'Orbitron',monospace;font-size:clamp(16px,5vw,22px);font-weight:900;color:var(--t-primary);letter-spacing:6px}
.icon-btn{width:34px;height:34px;background:var(--t-s2);border:1px solid var(--t-bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s;color:var(--t-dim);flex-shrink:0}
.icon-btn:hover,.icon-btn:focus-visible{border-color:var(--t-primary);color:var(--t-primary);outline:none}

/* QR Popup */
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(6,6,12,.93);z-index:500;align-items:center;justify-content:center;flex-direction:column}
.qr-overlay.on{display:flex}
.qr-card{background:var(--t-s1);border:1px solid var(--t-bdr);border-radius:16px;padding:24px;text-align:center}
.qr-card canvas{border-radius:8px}
.qr-url{font-size:12px;color:var(--t-dim);word-break:break-all;padding:8px;background:var(--t-bg);border-radius:6px;margin-top:10px;font-family:monospace;max-width:300px}
.qr-close{margin-top:16px;font-family:'Orbitron',monospace;font-size:13px;padding:10px 28px;border:1px solid var(--t-bdr);background:transparent;color:var(--t-dim);border-radius:10px;cursor:pointer;letter-spacing:2px;transition:all .2s}
.qr-close:hover,.qr-close:focus-visible{border-color:var(--t-primary);color:var(--t-primary);outline:none}

/* Setup */
.setup-card{background:var(--t-s1);border:1px solid var(--t-bdr);border-radius:14px;padding:32px 20px;margin-top:20px;text-align:center}
.setup-msg{font-family:'Orbitron',monospace;font-size:14px;color:var(--t-primary);letter-spacing:3px}
.setup-err{color:var(--t-secondary);font-size:14px;margin-top:10px}

/* Buzz hero — fixed layout */
.buzz-hero{background:var(--t-card-bg);border:2px solid var(--t-card-bdr);border-radius:14px;padding:20px 14px;text-align:center;margin-top:8px;transition:border-color .3s;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;position:relative}
.buzz-hero.tappable{cursor:pointer}
.buzz-hero.tappable::after{content:'Tap to start next round';position:absolute;bottom:10px;font-size:12px;color:var(--t-dim);letter-spacing:1px;animation:tapPulse 1.5s ease-in-out infinite}
@keyframes tapPulse{0%,100%{opacity:.4}50%{opacity:1}}
.bz-label{font-size:11px;letter-spacing:4px;color:var(--t-dim);text-transform:uppercase;min-height:18px}
.bz-team{font-size:13px;font-weight:600;min-height:20px;transition:color .2s}
.bz-name{font-family:'Orbitron',monospace;font-size:clamp(24px,7vw,32px);font-weight:900;letter-spacing:2px;min-height:40px;display:flex;align-items:center;justify-content:center;transition:color .2s}
.bz-timer{font-family:'Orbitron',monospace;font-size:clamp(40px,11vw,54px);font-weight:900;line-height:1;min-height:56px;display:flex;align-items:center;justify-content:center;transition:color .2s,opacity .2s}
.bz-sub{font-size:11px;letter-spacing:2px;color:var(--t-dim);text-transform:uppercase;min-height:18px}
.bz-more{width:100%;padding:8px;margin-top:10px;background:var(--t-s2);border:1px solid var(--t-bdr);border-radius:8px;color:var(--t-dim);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .2s}
.bz-more:hover{border-color:var(--t-primary);color:var(--t-primary)}
.bz-list{display:none;margin-top:8px;flex-direction:column;gap:4px}.bz-list.open{display:flex}
.bz-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--t-s2);border-radius:6px;font-size:12px}
.bz-ord{font-family:'Orbitron',monospace;font-weight:700;font-size:11px;width:22px;text-align:center}
.bz-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bz-gap{font-family:'Orbitron',monospace;font-size:11px;color:var(--t-dim);margin-left:auto}

/* See-all buzzes */

/* Lock toggle */
.lock-toggle{padding:12px 16px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-top:8px;transition:all .25s;border:2px solid}
.lock-toggle.unlocked{background:rgba(118,255,3,.05);border-color:rgba(118,255,3,.3)}
.lock-toggle.locked{background:rgba(255,62,108,.05);border-color:rgba(255,62,108,.3)}
.lock-icon{font-size:18px}
.lock-label{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px}
.lock-hint{font-size:12px;color:var(--t-dim)}

/* Team columns */
.teams-grid{display:flex;gap:6px;margin-top:8px}
.team-col{flex:1;background:var(--t-s1);border-radius:10px;overflow:hidden;border:1px solid;display:flex;flex-direction:column}
.team-hdr{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.team-title{display:flex;align-items:center;gap:6px}
.team-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.team-name{font-size:14px;font-weight:700;letter-spacing:1px}
.team-count{font-size:11px;color:var(--t-dim)}
.team-pen{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;color:var(--t-orange);letter-spacing:1px;cursor:pointer;text-align:center;border:1px solid rgba(255,145,0,.25);background:rgba(255,145,0,.06);transition:all .2s}
.team-pen:hover,.team-pen:focus-visible{background:rgba(255,145,0,.15);outline:none}
.team-players{padding:6px 8px;display:flex;flex-direction:column;gap:3px;flex:1}
.tp{display:flex;align-items:center;gap:6px;padding:4px;font-size:13px;border-radius:5px}
.tp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tp-name{flex:1;font-weight:600}
.tp-idle{font-size:10px;font-weight:700;color:var(--t-orange);letter-spacing:1px}
.tp-kick{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--t-s2);color:var(--t-dim);cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;font-weight:600;transition:all .15s}
.tp-kick:hover,.tp-kick:focus-visible{color:var(--t-secondary);outline:none}

/* No team section */
.no-team{background:var(--t-s1);border:1px solid var(--t-bdr);border-radius:10px;padding:8px 10px;margin-top:6px}
.no-team-hd{font-size:12px;color:var(--t-dim);letter-spacing:1px;margin-bottom:4px}

/* Timer input */
.timer-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--t-s1);border:1px solid var(--t-bdr);border-radius:10px;margin-top:8px}
.timer-row label{font-size:12px;color:var(--t-dim);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.timer-input-wrap{display:flex;align-items:center;gap:6px;margin-left:auto}
.timer-input{width:52px;padding:7px 4px;font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--t-primary);background:var(--t-bg);border:1px solid var(--t-bdr);border-radius:8px;text-align:center;outline:none;-moz-appearance:textfield}
.timer-input::-webkit-inner-spin-button,.timer-input::-webkit-outer-spin-button{-webkit-appearance:none}
.timer-input:focus{border-color:var(--t-primary)}
.timer-unit{font-size:14px;color:var(--t-dim);font-weight:600}

/* Action buttons */
.actions{margin-top:10px;display:flex;gap:6px}
.btn-big{flex:1;font-family:'Orbitron',monospace;font-size:clamp(14px,4vw,17px);font-weight:700;letter-spacing:3px;padding:16px;border:none;border-radius:12px;cursor:pointer;text-transform:uppercase;transition:all .25s;text-align:center}
.btn-big:focus-visible{outline:2px solid #fff;outline-offset:2px}
.btn-big.arm{background:var(--t-btn-start-bg);color:var(--t-btn-start-c)}
.btn-big.arm:hover{transform:scale(1.02)}
.btn-big.rst{background:var(--t-btn-reset-bg);color:var(--t-btn-reset-c)}
.btn-big.rst:hover{transform:scale(1.02)}
.btn-big:disabled{opacity:.2;cursor:not-allowed;transform:none!important}

.theme-btn{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;padding:8px 14px;border-radius:8px;border:2px solid var(--t-bdr);background:var(--t-s2);color:var(--t-dim);cursor:pointer;transition:all .2s;letter-spacing:1px}
.theme-btn:hover,.theme-btn:focus-visible{border-color:var(--t-primary);color:var(--t-primary);outline:none}
.theme-btn.active{border-color:var(--t-primary);color:var(--t-primary);background:var(--t-s1)}

.snd-badge{position:fixed;top:8px;right:8px;font-size:11px;color:var(--t-dim);background:var(--t-s1);border:1px solid var(--t-bdr);padding:4px 10px;border-radius:16px;z-index:100;cursor:pointer;transition:all .2s}
.snd-badge:hover,.snd-badge:focus-visible{border-color:var(--t-primary);outline:none}
</style>
</head>
<body>

<button class="snd-badge" id="sndB" onclick="toggleSnd()" aria-label="Toggle sound effects">🔊 Sound on</button>

<!-- QR Overlay -->
<div class="qr-overlay" id="qrOverlay" role="dialog" aria-label="QR Code to join room">
  <div class="qr-card">
    <div id="qrBox" style="width:180px;height:180px;margin:0 auto"></div>
    <div class="qr-url" id="qrUrl"></div>
  </div>
  <button class="qr-close" onclick="closeQR()" aria-label="Close QR code popup">Close</button>
</div>

<main>
  <!-- Setup (auto-creates) -->
  <div class="scr on" id="scrSetup">
    <div class="setup-card">
      <div class="setup-msg" role="status" aria-live="polite">Creating room…</div>
      <div class="setup-err" id="setupErr" role="alert"></div>
    </div>
  </div>

  <!-- Game -->
  <div class="scr" id="scrGame">
    <!-- Header -->
    <header>
      <div class="hbar">
        <a href="index.html" class="back-btn" aria-label="Back to home">←</a>
        <div class="hbar-logo" id="stdLogo">BUZZER</div>
        <img id="aldewaniahLogo" src="aldewaniah-logo.png" alt="الديوانية" style="display:none;height:32px;object-fit:contain">
        <div class="hbar-code" id="rcCode" aria-label="Room code"></div>
        <button class="icon-btn" onclick="openQR()" aria-label="Show QR code to join">⊞</button>
      </div>
    </header>

    <!-- Buzz hero card — fixed layout, content swaps only -->
    <section class="buzz-hero" id="buzzHero" aria-label="Buzz results" onclick="onBuzzHeroTap()">
      <div class="bz-label" id="bzLabel">Tap "Start Round" to begin</div>
      <div class="bz-team" id="bzTeam">&nbsp;</div>
      <div class="bz-name" id="bzName">&nbsp;</div>
      <div class="bz-timer" id="bzTimer">&nbsp;</div>
      <div class="bz-sub" id="bzSub">&nbsp;</div>
      <button class="bz-more" id="saBtn" style="visibility:hidden" onclick="event.stopPropagation();toggleSA()" aria-label="Show all buzzes">▼ See all buzzes</button>
      <div class="bz-list" id="bList" role="list"></div>
    </section>

    <!-- Lock toggle -->
    <div class="lock-toggle unlocked" id="lockToggle" onclick="toggleLock()" role="switch" aria-checked="false" aria-label="Lock or unlock teams" tabindex="0">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="lock-icon" id="lockIcon">🔓</span>
        <span class="lock-label" id="lockLabel" style="color:var(--t-green)">Teams unlocked</span>
      </div>
      <span class="lock-hint">tap to lock</span>
    </div>

    <!-- Teams grid -->
    <div class="teams-grid" id="teamsGrid" aria-label="Teams"></div>

    <!-- No-team players -->
    <div class="no-team" id="noTeamBox" style="display:none" aria-label="Players without a team">
      <div class="no-team-hd">No team</div>
      <div id="noTeamList"></div>
    </div>

    <!-- Timer -->
    <div class="timer-row">
      <label for="timerInput">Answer timer</label>
      <div class="timer-input-wrap">
        <input class="timer-input" id="timerInput" type="number" min="1" max="60" value="3" aria-label="Timer duration in seconds" onchange="onTimerChange(this.value)">
        <span class="timer-unit">seconds</span>
      </div>
    </div>

    <!-- Theme picker -->
    <div class="timer-row" style="flex-wrap:wrap;gap:6px">
      <label style="width:100%">Theme (syncs to all players)</label>
      <div id="themeBtns" style="display:flex;gap:4px;flex-wrap:wrap;width:100%"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-big arm" id="btnArm" onclick="doArm()" disabled aria-label="Start round — enable buzzers" style="width:100%">⚡ Start Round</button>
    </div>
  </div>
</main>

<script>
let host=null,sndOn=true,saOpen=false,timerInt=null,lobbyData={players:[],teams:[],teamsLocked:false};
let roundState='idle'; // idle | armed | buzzed | expired

function toggleSnd(){sndOn=!sndOn;document.getElementById('sndB').textContent=sndOn?'🔊 Sound on':'🔇 Sound off';}
function openQR(){document.getElementById('qrOverlay').classList.add('on');}
function closeQR(){document.getElementById('qrOverlay').classList.remove('on');}

window.addEventListener('DOMContentLoaded',()=>{doCreate();renderThemePicker();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeQR();});

async function doCreate(){
  document.getElementById('setupErr').textContent='';
  host=new BuzzerHost(onHostUpdate);
  try{const code=await host.create();showGame(code);}
  catch(e){document.getElementById('setupErr').textContent=e.message||'Failed to create room';}
}

function showGame(code){
  document.getElementById('scrSetup').classList.remove('on');
  document.getElementById('scrGame').classList.add('on');
  document.getElementById('rcCode').textContent=code;
  const url=host.getJoinURL();
  document.getElementById('qrUrl').textContent=url;
  const qb=document.getElementById('qrBox');qb.innerHTML='';
  new QRCode(qb,{text:url,width:170,height:170,colorDark:'#00E5FF',colorLight:'#06060C',correctLevel:QRCode.CorrectLevel.M});
  setHeroIdle();
}

function onHostUpdate(msg){
  switch(msg.type){
    case'lobby':lobbyData=msg;renderLobby();break;
    case'first_buzz':showFirst(msg);break;
    case'buzz_list':showBuzzList(msg.buzzes);break;
    case'team_penalized':renderLobby();break;
  }
}

// === Stable hero card state machine ===
function setHeroIdle(){
  roundState='idle';
  const hero=document.getElementById('buzzHero');
  hero.style.borderColor='var(--t-card-bdr)';
  hero.classList.remove('tappable');
  document.getElementById('bzLabel').textContent='Tap "Start Round" to begin';
  document.getElementById('bzLabel').style.color='';
  document.getElementById('bzTeam').innerHTML='&nbsp;';
  document.getElementById('bzName').innerHTML='&nbsp;';
  document.getElementById('bzName').style.color='';
  document.getElementById('bzName').style.textShadow='none';
  document.getElementById('bzTimer').innerHTML='&nbsp;';
  document.getElementById('bzTimer').style.color='';
  document.getElementById('bzTimer').style.opacity='1';
  document.getElementById('bzSub').innerHTML='&nbsp;';
  document.getElementById('saBtn').style.visibility='hidden';
  document.getElementById('bList').classList.remove('open');
  document.getElementById('bList').innerHTML='';
  saOpen=false;
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  // Re-enable Start Round button
  document.getElementById('btnArm').disabled=(lobbyData.players||[]).length===0;
  document.getElementById('btnArm').style.opacity='1';
  document.getElementById('btnArm').style.pointerEvents='auto';
}

function setHeroWaiting(){
  roundState='armed';
  const hero=document.getElementById('buzzHero');
  hero.style.borderColor='var(--t-primary)';
  hero.classList.remove('tappable');
  document.getElementById('bzLabel').textContent='Waiting for buzz…';
  document.getElementById('bzLabel').style.color='var(--t-primary)';
  document.getElementById('bzTeam').innerHTML='&nbsp;';
  document.getElementById('bzName').innerHTML='&nbsp;';
  document.getElementById('bzName').style.color='';
  document.getElementById('bzName').style.textShadow='none';
  document.getElementById('bzTimer').innerHTML='&nbsp;';
  document.getElementById('bzTimer').style.color='var(--t-primary)';
  document.getElementById('bzTimer').style.opacity='1';
  document.getElementById('bzSub').innerHTML='&nbsp;';
  document.getElementById('saBtn').style.visibility='hidden';
  document.getElementById('bList').classList.remove('open');
  document.getElementById('bList').innerHTML='';
  saOpen=false;
  // Disable Start Round while armed
  document.getElementById('btnArm').disabled=true;
  document.getElementById('btnArm').style.opacity='.2';
  document.getElementById('btnArm').style.pointerEvents='none';
}

function showFirst(msg){
  roundState='buzzed';
  if(sndOn)playSound('buzz');
  const hero=document.getElementById('buzzHero');
  hero.style.borderColor=msg.color;
  hero.classList.remove('tappable');
  const teamInfo=msg.team&&lobbyData.teams.find(t=>t.id===msg.team);
  document.getElementById('bzLabel').textContent='🏆 First Buzzer';
  document.getElementById('bzLabel').style.color='';
  document.getElementById('bzTeam').textContent=teamInfo?teamInfo.name:' ';
  document.getElementById('bzTeam').style.color=teamInfo?teamInfo.color:'';
  document.getElementById('bzName').textContent=msg.name;
  document.getElementById('bzName').style.color=msg.color;
  document.getElementById('bzName').style.textShadow='0 0 14px '+msg.color;
  document.getElementById('bzSub').textContent='Answer time';

  let rem=msg.timerDuration;
  document.getElementById('bzTimer').textContent=rem.toFixed(1)+'s';
  document.getElementById('bzTimer').style.color=msg.color;
  document.getElementById('bzTimer').style.opacity='1';

  if(timerInt)clearInterval(timerInt);
  const t0=Date.now();
  timerInt=setInterval(()=>{
    rem=Math.max(0,msg.timerDuration-(Date.now()-t0)/1000);
    const cd=document.getElementById('bzTimer');
    if(cd){
      cd.textContent=rem.toFixed(1)+'s';
      if(rem<=0){
        clearInterval(timerInt);timerInt=null;
        cd.style.opacity='.3';
        onTimerExpired();
      }
    }
  },50);
}

function onTimerExpired(){
  roundState='expired';
  document.getElementById('bzSub').textContent='Time up';
  document.getElementById('buzzHero').classList.add('tappable');
}

function onBuzzHeroTap(){
  if(roundState==='expired'){
    // Reset and go back to idle
    host.resetRound();
    setHeroIdle();
  }
}

function doArm(){
  if(roundState!=='idle') return;
  host.setTimer(document.getElementById('timerInput').value);
  host.armRound();
  if(sndOn)playSound('arm');
  setHeroWaiting();
}

function showBuzzList(buzzes){
  if(buzzes.length>1){
    document.getElementById('saBtn').style.visibility='visible';
    document.getElementById('saBtn').textContent=(saOpen?'▲ Hide':'▼ See all')+' buzzes ('+buzzes.length+')';
  }
  document.getElementById('bList').innerHTML=buzzes.slice(1).map(b=>
    '<div class="bz-item" role="listitem"><span class="bz-ord" style="color:'+b.color+'">#'+b.order+'</span><span class="bz-dot" style="background:'+b.color+'"></span><span style="flex:1;font-weight:600">'+esc(b.name)+'</span><span class="bz-gap">+'+b.gap+'ms</span></div>'
  ).join('');
}

function toggleSA(){
  saOpen=!saOpen;
  document.getElementById('bList').classList.toggle('open',saOpen);
  const btn=document.getElementById('saBtn'),n=btn.textContent.match(/\(\d+\)/)?.[0]||'';
  btn.textContent=(saOpen?'▲ Hide':'▼ See all')+' buzzes '+n;
}

function renderLobby(){  const{players,teams,teamsLocked}=lobbyData;
  document.getElementById('btnArm').disabled=players.length===0;

  // Lock toggle
  const lt=document.getElementById('lockToggle');
  const li=document.getElementById('lockIcon');
  const ll=document.getElementById('lockLabel');
  const lh=lt.querySelector('.lock-hint');
  if(teamsLocked){lt.className='lock-toggle locked';li.textContent='🔒';ll.textContent='Teams locked';ll.style.color='var(--t-secondary)';lh.textContent='tap to unlock';lt.setAttribute('aria-checked','true');}
  else{lt.className='lock-toggle unlocked';li.textContent='🔓';ll.textContent='Teams unlocked';ll.style.color='var(--t-green)';lh.textContent='tap to lock';lt.setAttribute('aria-checked','false');}

  // Team columns
  const grid=document.getElementById('teamsGrid');
  const teamPlayerMap={};
  players.forEach(p=>{if(p.team){(teamPlayerMap[p.team]=teamPlayerMap[p.team]||[]).push(p);}});

  if(teams.length>0){
    grid.innerHTML=teams.map(t=>{
      const tp=teamPlayerMap[t.id]||[];
      return `<div class="team-col" style="border-color:${t.color}25">
        <div class="team-hdr" style="background:${t.color}0C">
          <div class="team-title">
            <div class="team-dot" style="background:${t.color};box-shadow:0 0 5px ${t.color}55"></div>
            <span class="team-name" style="color:${t.color}">${esc(t.name)}</span>
            <span class="team-count">${tp.length}</span>
          </div>
          <button class="team-pen" onclick="penTeam('${t.id}')" aria-label="Penalize team ${esc(t.name)} for 10 seconds">⚠ Penalize</button>
        </div>
        <div class="team-players">${tp.map(p=>playerRow(p)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    grid.innerHTML='<div style="flex:1;text-align:center;padding:16px;color:var(--t-dim);font-size:13px">Players create teams from their screen</div>';
  }

  // No-team players
  const noTeam=players.filter(p=>!p.team);
  const ntBox=document.getElementById('noTeamBox');
  if(noTeam.length>0){
    ntBox.style.display='block';
    document.getElementById('noTeamList').innerHTML=noTeam.map(p=>playerRow(p)).join('');
  } else {ntBox.style.display='none';}
}

function playerRow(p){
  const idle=p.idle?'<span class="tp-idle">IDLE</span>':'';
  return `<div class="tp" style="opacity:${p.idle?.4:1}">
    <div class="tp-dot" style="background:${p.color}"></div>
    <span class="tp-name">${esc(p.name)}</span>${idle}
    <button class="tp-kick" onclick="kickP('${p.id}')" aria-label="Kick ${esc(p.name)}">kick</button>
  </div>`;
}

function toggleLock(){if(lobbyData.teamsLocked)host.unlockTeams();else host.lockTeams();}
function penTeam(tid){host.penalizeTeam(tid);}
function kickP(pid){host.kickPlayer(pid);}
function onTimerChange(v){host.setTimer(v);}

// Theme system
let activeTheme='neon';
function renderThemePicker(){
  const list=getThemeList();
  document.getElementById('themeBtns').innerHTML=list.map(t=>
    `<button class="theme-btn ${t.id===activeTheme?'active':''}" onclick="changeTheme('${t.id}')" aria-label="Switch to ${t.name} theme">${t.name}</button>`
  ).join('');
}
function changeTheme(id){
  activeTheme=id;
  applyTheme(id);
  if(host) host.setTheme(id);
  renderThemePicker();
}
// Render on load
window.addEventListener('DOMContentLoaded',()=>{renderThemePicker();});
</script>
</body>
</html>
