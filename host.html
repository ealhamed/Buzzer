<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BUZZER — Host</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="buzzer.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#06060C;--s1:#0E0E18;--s2:#161624;--bdr:#222236;
    --txt:#E0E0F0;--dim:#55557A;--cyan:#00E5FF;--pink:#FF3E6C;--green:#76FF03;--yellow:#FFD600;
  }
  html,body{height:100%}
  body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(255,62,108,.04) 0%,transparent 50%);pointer-events:none}

  .wrap{position:relative;z-index:1;padding:16px;max-width:520px;margin:0 auto;min-height:100vh}

  /* Header */
  .hdr{text-align:center;padding:16px 0 8px}
  .logo{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:12px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-top:2px}

  /* Screens */
  .scr{display:none}.scr.on{display:block}

  /* Setup */
  .setup-card{background:var(--s1);border:1px solid var(--bdr);border-radius:16px;padding:32px 24px;margin-top:24px;text-align:center}
  .btn-create{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;letter-spacing:3px;padding:18px 48px;border:2px solid var(--cyan);background:transparent;color:var(--cyan);border-radius:12px;cursor:pointer;transition:all .3s;text-transform:uppercase}
  .btn-create:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 30px rgba(0,229,255,.3)}
  .btn-create:disabled{opacity:.4;cursor:wait}
  .setup-err{color:var(--pink);font-size:13px;margin-top:12px;min-height:20px}

  /* Room info card */
  .room-card{background:var(--s1);border:1px solid var(--bdr);border-radius:16px;padding:20px;margin-top:14px;text-align:center}
  .rc-label{font-size:11px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
  .rc-code{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;color:var(--cyan);letter-spacing:10px;text-shadow:0 0 20px rgba(0,229,255,.3)}
  #qrBox{margin:14px auto;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
  #qrBox canvas{border-radius:8px}
  .rc-url{font-size:11px;color:var(--dim);word-break:break-all;padding:8px;background:var(--bg);border-radius:8px;margin-top:8px;font-family:monospace}

  /* Players */
  .sec{margin-top:14px}
  .sec-hd{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .badge{background:var(--s2);color:var(--cyan);font-size:11px;padding:2px 10px;border-radius:20px;font-family:'Orbitron',monospace}
  .pgrid{display:flex;flex-wrap:wrap;gap:8px}
  .pchip{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:7px 14px;font-size:14px;font-weight:600;transition:all .2s}
  .pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  /* Controls */
  .ctrls{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  .timer-row{display:flex;align-items:center;justify-content:center;gap:12px}
  .timer-row label{font-size:12px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
  .tbtns{display:flex;gap:4px}
  .tbtn{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;padding:6px 16px;border:1px solid var(--bdr);background:var(--s1);color:var(--dim);border-radius:8px;cursor:pointer;transition:all .2s}
  .tbtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08)}
  .btn-arm{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;letter-spacing:3px;padding:20px;border:none;border-radius:14px;cursor:pointer;text-transform:uppercase;transition:all .3s}
  .btn-arm.arm{background:linear-gradient(135deg,#00E5FF,#00B4D8);color:var(--bg);box-shadow:0 0 25px rgba(0,229,255,.3)}
  .btn-arm.arm:hover{transform:scale(1.02);box-shadow:0 0 40px rgba(0,229,255,.4)}
  .btn-arm.rst{background:linear-gradient(135deg,#FF3E6C,#D81B60);color:#fff;box-shadow:0 0 25px rgba(255,62,108,.3)}
  .btn-arm.rst:hover{transform:scale(1.02)}
  .btn-arm:disabled{opacity:.25;cursor:not-allowed;transform:none!important}

  /* Buzz area */
  .buzz-area{margin-top:14px}
  .idle-msg{text-align:center;color:var(--dim);font-size:13px;padding:18px;letter-spacing:1px}
  .wait-badge{text-align:center;font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;padding:14px;border-radius:10px;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,229,255,.25);background:rgba(0,229,255,.04);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{border-color:rgba(0,229,255,.25)}50%{border-color:rgba(0,229,255,.6)}}

  .first-box{background:var(--s1);border:2px solid;border-radius:16px;padding:24px;text-align:center;animation:buzzIn .4s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
  @keyframes buzzIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
  .first-box::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none}
  .f-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;opacity:.5;margin-bottom:6px}
  .f-name{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:2px}
  .f-timer{font-family:'Orbitron',monospace;font-size:44px;font-weight:900;margin-top:6px}
  .f-tlabel{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.4;margin-top:2px}

  .sa-btn{width:100%;padding:12px;margin-top:10px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .sa-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .blist{display:none;margin-top:8px;flex-direction:column;gap:6px}
  .blist.open{display:flex}
  .bitem{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;font-size:13px;animation:si .3s ease}
  @keyframes si{from{transform:translateX(-8px);opacity:0}to{transform:translateX(0);opacity:1}}
  .b-ord{font-family:'Orbitron',monospace;font-weight:700;font-size:12px;width:26px;text-align:center;flex-shrink:0}
  .b-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .b-name{flex:1;font-weight:600}
  .b-gap{font-family:'Orbitron',monospace;font-size:11px;color:var(--dim)}

  .snd{position:fixed;top:10px;right:10px;font-size:11px;color:var(--dim);background:var(--s1);border:1px solid var(--bdr);padding:4px 10px;border-radius:20px;z-index:100;cursor:pointer}
</style>
</head>
<body>

<div class="snd" id="sndBadge" onclick="toggleSnd()">🔊 ON</div>

<div class="wrap">
  <div class="hdr">
    <div class="logo">BUZZER</div>
    <div class="sub">Host Control</div>
  </div>

  <!-- Setup -->
  <div class="scr on" id="scrSetup">
    <div class="setup-card">
      <button class="btn-create" id="btnCreate" onclick="doCreate()">Create Room</button>
      <div class="setup-err" id="setupErr"></div>
    </div>
  </div>

  <!-- Game -->
  <div class="scr" id="scrGame">
    <div class="room-card">
      <div class="rc-label">Room Code</div>
      <div class="rc-code" id="rcCode"></div>
      <div id="qrBox"></div>
      <div class="rc-url" id="rcUrl"></div>
    </div>

    <div class="sec">
      <div class="sec-hd">Players <span class="badge" id="pCount">0</span></div>
      <div class="pgrid" id="pGrid"></div>
    </div>

    <div class="ctrls">
      <div class="timer-row">
        <label>Timer</label>
        <div class="tbtns">
          <button class="tbtn on" onclick="setTmr(3,this)">3s</button>
          <button class="tbtn" onclick="setTmr(5,this)">5s</button>
        </div>
      </div>
      <button class="btn-arm arm" id="btnArm" onclick="doArm()" disabled>⚡ Arm Round</button>
      <button class="btn-arm rst" id="btnRst" onclick="doReset()" style="display:none">↺ Reset</button>
    </div>

    <div class="buzz-area" id="buzzArea">
      <div class="idle-msg" id="idleMsg">Arm a round to begin</div>
      <div class="wait-badge" id="waitBadge" style="display:none">Waiting for buzz…</div>
      <div id="firstBox" style="display:none"></div>
      <button class="sa-btn" id="saBtn" style="display:none" onclick="toggleSA()">▼ See all buzzes</button>
      <div class="blist" id="bList"></div>
    </div>
  </div>
</div>

<script>
let host = null;
let sndOn = true;
let saOpen = false;
let timerInt = null;

function toggleSnd(){
  sndOn=!sndOn;
  document.getElementById('sndBadge').textContent = sndOn ? '🔊 ON' : '🔇 OFF';
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function doCreate(){
  const btn = document.getElementById('btnCreate');
  btn.disabled = true;
  btn.textContent = 'CONNECTING…';
  document.getElementById('setupErr').textContent = '';

  host = new BuzzerHost(onHostUpdate);
  try {
    const code = await host.create();
    showGame(code);
  } catch(e){
    document.getElementById('setupErr').textContent = e.message || 'Failed to create room';
    btn.disabled = false;
    btn.textContent = 'CREATE ROOM';
  }
}

function showGame(code){
  document.getElementById('scrSetup').classList.remove('on');
  document.getElementById('scrGame').classList.add('on');
  document.getElementById('rcCode').textContent = code;

  const url = host.getJoinURL();
  document.getElementById('rcUrl').textContent = url;

  // QR
  const qrBox = document.getElementById('qrBox');
  qrBox.innerHTML = '';
  new QRCode(qrBox, {
    text: url,
    width: 170, height: 170,
    colorDark: '#00E5FF',
    colorLight: '#06060C',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function onHostUpdate(msg){
  switch(msg.type){
    case 'player_list':
      document.getElementById('pCount').textContent = msg.players.length;
      document.getElementById('btnArm').disabled = msg.players.length === 0;
      document.getElementById('pGrid').innerHTML = msg.players.map(p =>
        `<div class="pchip"><div class="pdot" style="background:${p.color};box-shadow:0 0 6px ${p.color}"></div>${esc(p.name)}</div>`
      ).join('');
      break;
    case 'first_buzz':
      showFirst(msg);
      break;
    case 'buzz_list':
      showBuzzList(msg.buzzes);
      break;
  }
}

function setTmr(s, el){
  host.setTimer(s);
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

function doArm(){
  host.armRound();
  document.getElementById('btnArm').style.display='none';
  document.getElementById('btnRst').style.display='block';
  document.getElementById('idleMsg').style.display='none';
  document.getElementById('waitBadge').style.display='block';
  document.getElementById('firstBox').style.display='none';
  document.getElementById('saBtn').style.display='none';
  document.getElementById('bList').classList.remove('open');
  document.getElementById('bList').innerHTML='';
  saOpen=false;
  if(timerInt) clearInterval(timerInt);
}

function doReset(){
  host.resetRound();
  document.getElementById('btnArm').style.display='block';
  document.getElementById('btnRst').style.display='none';
  document.getElementById('idleMsg').style.display='block';
  document.getElementById('waitBadge').style.display='none';
  document.getElementById('firstBox').style.display='none';
  document.getElementById('saBtn').style.display='none';
  document.getElementById('bList').classList.remove('open');
  document.getElementById('bList').innerHTML='';
  saOpen=false;
  if(timerInt) clearInterval(timerInt);
}

function showFirst(msg){
  if(sndOn) playBuzzSound();
  document.getElementById('waitBadge').style.display='none';
  const el = document.getElementById('firstBox');
  el.style.display='block';
  el.style.borderColor=msg.color;
  let rem = msg.timerDuration;
  el.innerHTML=`
    <div class="f-label">🏆 First Buzzer</div>
    <div class="f-name" style="color:${msg.color};text-shadow:0 0 18px ${msg.color}">${esc(msg.name)}</div>
    <div class="f-timer" id="cd" style="color:${msg.color}">${rem.toFixed(1)}s</div>
    <div class="f-tlabel">Answer Time</div>`;
  if(timerInt) clearInterval(timerInt);
  const t0=Date.now();
  timerInt=setInterval(()=>{
    rem=Math.max(0,msg.timerDuration-(Date.now()-t0)/1000);
    const cd=document.getElementById('cd');
    if(cd){cd.textContent=rem.toFixed(1)+'s';if(rem<=0){clearInterval(timerInt);cd.style.opacity='.35'}}
  },50);
}

function showBuzzList(buzzes){
  if(buzzes.length>1){
    const btn=document.getElementById('saBtn');
    btn.style.display='block';
    btn.textContent=(saOpen?'▲ Hide':'▼ See all')+` buzzes (${buzzes.length})`;
  }
  document.getElementById('bList').innerHTML=buzzes.slice(1).map(b=>
    `<div class="bitem">
      <div class="b-ord" style="color:${b.color}">#${b.order}</div>
      <div class="b-dot" style="background:${b.color}"></div>
      <div class="b-name">${esc(b.name)}</div>
      <div class="b-gap">+${b.gap}ms</div>
    </div>`
  ).join('');
}

function toggleSA(){
  saOpen=!saOpen;
  document.getElementById('bList').classList.toggle('open',saOpen);
  const btn=document.getElementById('saBtn');
  const n=btn.textContent.match(/\(\d+\)/)?.[0]||'';
  btn.textContent=(saOpen?'▲ Hide':'▼ See all')+` buzzes ${n}`;
}
</script>
</body>
</html>
