<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06060C">
<title>BUZZER — Host</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="buzzer.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#06060C;--s1:#0E0E18;--s2:#161624;--bdr:#222236;--txt:#E0E0F0;--dim:#55557A;--cyan:#00E5FF;--pink:#FF3E6C;--green:#76FF03;--yellow:#FFD600;--orange:#FF9100}
  html,body{height:100%}
  body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-overflow-scrolling:touch}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(255,62,108,.03) 0%,transparent 50%);pointer-events:none}

  .wrap{position:relative;z-index:1;padding:14px;max-width:560px;margin:0 auto;padding-bottom:100px}
  .hdr{text-align:center;padding:12px 0 6px}
  .logo{font-family:'Orbitron',monospace;font-size:clamp(22px,6vw,28px);font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:clamp(11px,3vw,13px);color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-top:2px}

  .scr{display:none}.scr.on{display:block}

  .card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:16px;margin-top:12px}
  .card-t{font-family:'Orbitron',monospace;font-size:clamp(11px,3vw,13px);letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .badge{background:var(--s2);color:var(--cyan);font-size:clamp(10px,2.8vw,12px);padding:2px 10px;border-radius:16px;font-family:'Orbitron',monospace}

  /* Setup */
  .setup-card{text-align:center;padding:28px 20px}
  .btn-create{font-family:'Orbitron',monospace;font-size:clamp(15px,4vw,18px);font-weight:700;letter-spacing:3px;padding:18px 44px;border:2px solid var(--cyan);background:transparent;color:var(--cyan);border-radius:14px;cursor:pointer;transition:all .3s;text-transform:uppercase}
  .btn-create:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 30px rgba(0,229,255,.3)}
  .btn-create:disabled{opacity:.4;cursor:wait}
  .setup-err{color:var(--pink);font-size:clamp(12px,3vw,14px);margin-top:10px}

  /* Room code */
  .rc-center{text-align:center}
  .rc-label{font-size:clamp(10px,2.8vw,12px);color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
  .rc-code{font-family:'Orbitron',monospace;font-size:clamp(32px,10vw,44px);font-weight:900;color:var(--cyan);letter-spacing:10px;text-shadow:0 0 18px rgba(0,229,255,.3)}
  #qrBox{margin:12px auto;width:164px;height:164px}
  #qrBox canvas{border-radius:6px}
  .rc-url{font-size:clamp(10px,2.5vw,12px);color:var(--dim);word-break:break-all;padding:6px 8px;background:var(--bg);border-radius:6px;margin-top:6px;font-family:monospace}

  /* Teams card */
  .teams-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .team-chip{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;background:var(--s2);font-size:clamp(12px,3.2vw,14px);font-weight:700;border:1px solid var(--bdr);transition:all .15s}
  .team-dot{width:10px;height:10px;border-radius:50%}
  .team-count{font-size:clamp(10px,2.5vw,12px);color:var(--dim);font-family:'Orbitron',monospace}
  .team-pen-btn{font-size:clamp(10px,2.5vw,12px);padding:3px 8px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--dim);cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;margin-left:4px;transition:all .15s}
  .team-pen-btn:hover{border-color:var(--orange);color:var(--orange)}

  /* Team lock toggle — prominent */
  .lock-toggle{display:flex;align-items:center;gap:12px;margin-top:10px;padding:10px 14px;border-radius:12px;border:1px solid var(--bdr);background:var(--s2);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .lock-toggle:active{transform:scale(.97)}
  .lock-toggle.locked{border-color:var(--pink);background:rgba(255,62,108,.08)}
  .lock-toggle.unlocked{border-color:var(--green);background:rgba(118,255,3,.05)}
  .lock-icon{font-size:20px;flex-shrink:0}
  .lock-label{font-size:clamp(13px,3.5vw,15px);font-weight:700;letter-spacing:1px;flex:1}
  .lock-switch{width:48px;height:26px;border-radius:13px;position:relative;transition:all .3s;flex-shrink:0}
  .lock-switch.off{background:#333}
  .lock-switch.on{background:var(--pink)}
  .lock-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .3s}
  .lock-switch.on::after{left:25px}

  /* Lobby */
  .lobby-grid{display:flex;flex-direction:column;gap:6px}
  .lp{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s2);border-radius:8px;font-size:clamp(13px,3.5vw,15px);transition:all .2s}
  .lp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .lp-name{flex:1;font-weight:600}
  .lp-team{font-size:clamp(10px,2.8vw,12px);padding:2px 8px;border-radius:10px;font-weight:600}
  .lp-idle{font-size:clamp(10px,2.5vw,12px);color:var(--orange);font-family:'Orbitron',monospace;letter-spacing:1px}
  .lp-pen{font-size:clamp(10px,2.5vw,12px);color:var(--pink);font-family:'Orbitron',monospace;letter-spacing:1px}
  .lp-actions{display:flex;gap:4px}
  .lp-btn{font-size:clamp(11px,2.8vw,13px);padding:4px 10px;border-radius:7px;border:1px solid var(--bdr);background:var(--s1);color:var(--dim);cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;transition:all .15s}
  .lp-btn:hover{border-color:var(--pink);color:var(--pink)}
  .lp-btn.pen:hover{border-color:var(--orange);color:var(--orange)}

  /* Settings */
  .set-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .set-row label{font-size:clamp(11px,3vw,13px);color:var(--dim);letter-spacing:2px;text-transform:uppercase}
  .tbtns{display:flex;gap:4px}
  .tbtn{font-family:'Orbitron',monospace;font-size:clamp(12px,3vw,14px);font-weight:700;padding:6px 16px;border:1px solid var(--bdr);background:var(--s1);color:var(--dim);border-radius:8px;cursor:pointer;transition:all .2s}
  .tbtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.06)}

  /* Big buttons */
  .btn-big{font-family:'Orbitron',monospace;font-size:clamp(16px,4.5vw,20px);font-weight:700;letter-spacing:3px;padding:20px;border:none;border-radius:14px;cursor:pointer;text-transform:uppercase;transition:all .25s;width:100%}
  .btn-big.arm{background:linear-gradient(135deg,#00E5FF,#00B4D8);color:var(--bg);box-shadow:0 0 20px rgba(0,229,255,.25)}
  .btn-big.arm:hover{transform:scale(1.02);box-shadow:0 0 35px rgba(0,229,255,.35)}
  .btn-big.rst{background:linear-gradient(135deg,#FF3E6C,#D81B60);color:#fff;box-shadow:0 0 20px rgba(255,62,108,.25)}
  .btn-big.rst:hover{transform:scale(1.02)}
  .btn-big:disabled{opacity:.2;cursor:not-allowed;transform:none!important}

  /* Buzz display */
  .idle-msg{text-align:center;color:var(--dim);font-size:clamp(12px,3.2vw,14px);padding:14px;letter-spacing:1px}
  .wait-badge{text-align:center;font-family:'Orbitron',monospace;font-size:clamp(12px,3.2vw,14px);letter-spacing:4px;padding:14px;border-radius:10px;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,229,255,.2);background:rgba(0,229,255,.03);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{border-color:rgba(0,229,255,.2)}50%{border-color:rgba(0,229,255,.5)}}

  .first-box{background:var(--s1);border:2px solid;border-radius:14px;padding:22px;text-align:center;animation:buzzIn .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes buzzIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .f-label{font-size:clamp(10px,2.8vw,12px);letter-spacing:4px;text-transform:uppercase;opacity:.45;margin-bottom:4px}
  .f-team{font-size:clamp(12px,3.2vw,14px);letter-spacing:1px;opacity:.7;margin-bottom:2px}
  .f-name{font-family:'Orbitron',monospace;font-size:clamp(24px,7vw,32px);font-weight:900;letter-spacing:2px}
  .f-timer{font-family:'Orbitron',monospace;font-size:clamp(36px,10vw,48px);font-weight:900;margin-top:4px}
  .f-tlabel{font-size:clamp(10px,2.5vw,12px);letter-spacing:3px;text-transform:uppercase;opacity:.35;margin-top:2px}

  .sa-btn{width:100%;padding:10px;margin-top:8px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3.2vw,14px);font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .sa-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .blist{display:none;margin-top:6px;flex-direction:column;gap:5px}
  .blist.open{display:flex}
  .bitem{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s1);border:1px solid var(--bdr);border-radius:8px;font-size:clamp(12px,3.2vw,14px);animation:si .3s ease}
  @keyframes si{from{transform:translateX(-8px);opacity:0}to{transform:translateX(0);opacity:1}}
  .b-ord{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(11px,3vw,13px);width:26px;text-align:center;flex-shrink:0}
  .b-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .b-name{flex:1;font-weight:600}
  .b-gap{font-family:'Orbitron',monospace;font-size:clamp(10px,2.8vw,12px);color:var(--dim)}

  .snd-badge{position:fixed;top:8px;right:8px;font-size:clamp(11px,3vw,14px);color:var(--dim);background:var(--s1);border:1px solid var(--bdr);padding:4px 10px;border-radius:16px;z-index:100;cursor:pointer}
</style>
</head>
<body>
<div class="snd-badge" id="sndB" onclick="toggleSnd()">🔊</div>
<div class="wrap">
  <div class="hdr"><div class="logo">BUZZER</div><div class="sub">Host Control</div></div>

  <div class="scr on" id="scrSetup">
    <div class="card setup-card">
      <button class="btn-create" id="btnCreate" onclick="doCreate()">Create Room</button>
      <div class="setup-err" id="setupErr"></div>
    </div>
  </div>

  <div class="scr" id="scrGame">
    <div class="card rc-center">
      <div class="rc-label">Room Code</div>
      <div class="rc-code" id="rcCode"></div>
      <div id="qrBox"></div>
      <div class="rc-url" id="rcUrl"></div>
    </div>

    <div class="card" id="teamsCard">
      <div class="card-t">Teams <span class="badge" id="tCount">0</span></div>
      <div class="teams-row" id="teamsRow"><span style="font-size:clamp(12px,3.2vw,14px);color:var(--dim)">Players create teams from their screen</span></div>
      <div class="lock-toggle unlocked" id="lockToggle" onclick="toggleLock()">
        <div class="lock-icon" id="lockIcon">🔓</div>
        <div class="lock-label" id="lockLabel">Teams Unlocked</div>
        <div class="lock-switch off" id="lockSwitch"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">Lobby <span class="badge" id="pCount">0</span></div>
      <div class="lobby-grid" id="lobbyGrid"><span class="idle-msg">Waiting for players…</span></div>
    </div>

    <div class="card">
      <div class="set-row">
        <label>Timer</label>
        <div class="tbtns" id="timerBtns">
          <button class="tbtn on" onclick="setTmr(3,this)">3s</button>
          <button class="tbtn" onclick="setTmr(5,this)">5s</button>
        </div>
        <label style="margin-left:auto">Sound</label>
        <div class="tbtns" id="sndBtns">
          <button class="tbtn on" onclick="setSnd('arcade',this)">Arcade</button>
          <button class="tbtn" onclick="setSnd('classic',this)">Classic</button>
          <button class="tbtn" onclick="setSnd('scifi',this)">Sci-Fi</button>
        </div>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-big arm" id="btnArm" onclick="doArm()" disabled>⚡ Arm Round</button>
      <button class="btn-big rst" id="btnRst" onclick="doReset()" style="display:none">↺ Reset</button>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="idle-msg" id="idleMsg">Arm a round to begin</div>
      <div class="wait-badge" id="waitBadge" style="display:none">Waiting for buzz…</div>
      <div id="firstBox" style="display:none"></div>
      <button class="sa-btn" id="saBtn" style="display:none" onclick="toggleSA()">▼ See all buzzes</button>
      <div class="blist" id="bList"></div>
    </div>
  </div>
</div>

<script>
let host=null,sndOn=true,saOpen=false,timerInt=null,lobbyData={players:[],teams:[],teamsLocked:false};

function toggleSnd(){sndOn=!sndOn;document.getElementById('sndB').textContent=sndOn?'🔊':'🔇';}

async function doCreate(){
  const btn=document.getElementById('btnCreate');btn.disabled=true;btn.textContent='CONNECTING…';
  document.getElementById('setupErr').textContent='';
  host=new BuzzerHost(onHostUpdate);
  try{const code=await host.create();showGame(code);}
  catch(e){document.getElementById('setupErr').textContent=e.message||'Failed';btn.disabled=false;btn.textContent='CREATE ROOM';}
}

function showGame(code){
  document.getElementById('scrSetup').classList.remove('on');
  document.getElementById('scrGame').classList.add('on');
  document.getElementById('rcCode').textContent=code;
  const url=host.getJoinURL();document.getElementById('rcUrl').textContent=url;
  const qb=document.getElementById('qrBox');qb.innerHTML='';
  new QRCode(qb,{text:url,width:156,height:156,colorDark:'#00E5FF',colorLight:'#06060C',correctLevel:QRCode.CorrectLevel.M});
}

function onHostUpdate(msg){
  switch(msg.type){
    case 'lobby':lobbyData=msg;renderLobby();break;
    case 'first_buzz':showFirst(msg);break;
    case 'buzz_list':showBuzzList(msg.buzzes);break;
    case 'team_penalized':renderLobby();break;
  }
}

function renderLobby(){
  const{players,teams,teamsLocked}=lobbyData;
  document.getElementById('pCount').textContent=players.length;
  document.getElementById('btnArm').disabled=players.length===0;
  document.getElementById('tCount').textContent=teams.length;

  // Teams
  if(teams.length>0){
    const tpc={};players.forEach(p=>{if(p.team)tpc[p.team]=(tpc[p.team]||0)+1;});
    document.getElementById('teamsRow').innerHTML=teams.map(t=>{
      const cnt=tpc[t.id]||0;
      return `<div class="team-chip"><div class="team-dot" style="background:${t.color};box-shadow:0 0 6px ${t.color}"></div>${esc(t.name)} <span class="team-count">${cnt}</span><button class="team-pen-btn" onclick="penTeam('${t.id}')" title="10s penalty">⚠ Penalize</button></div>`;
    }).join('');
  } else {
    document.getElementById('teamsRow').innerHTML='<span style="font-size:clamp(12px,3.2vw,14px);color:var(--dim)">Players create teams from their screen</span>';
  }

  // Lock toggle state
  const lt=document.getElementById('lockToggle'),li=document.getElementById('lockIcon'),ll=document.getElementById('lockLabel'),ls=document.getElementById('lockSwitch');
  if(teamsLocked){lt.className='lock-toggle locked';li.textContent='🔒';ll.textContent='Teams Locked';ls.className='lock-switch on';}
  else{lt.className='lock-toggle unlocked';li.textContent='🔓';ll.textContent='Teams Unlocked';ls.className='lock-switch off';}

  // Players
  const grid=document.getElementById('lobbyGrid');
  if(players.length===0){grid.innerHTML='<span class="idle-msg">Waiting for players…</span>';return;}
  const teamMap=new Map();teams.forEach(t=>teamMap.set(t.id,t));
  const noTeam=players.filter(p=>!p.team),byTeam={};
  players.filter(p=>p.team).forEach(p=>{(byTeam[p.team]=byTeam[p.team]||[]).push(p);});

  let html='';
  for(const t of teams){
    const tp=byTeam[t.id]||[];
    if(tp.length>0){
      html+=`<div style="font-size:clamp(11px,3vw,13px);color:${t.color};letter-spacing:2px;text-transform:uppercase;margin-top:6px;font-weight:700">${esc(t.name)}</div>`;
      tp.forEach(p=>{html+=playerRow(p,teamMap);});
    }
  }
  if(noTeam.length>0){
    if(teams.length>0)html+='<div style="font-size:clamp(11px,3vw,13px);color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:6px">No Team</div>';
    noTeam.forEach(p=>{html+=playerRow(p,teamMap);});
  }
  grid.innerHTML=html;
}

function playerRow(p,teamMap){
  const idle=p.idle?'<span class="lp-idle">IDLE</span>':'';
  const pen=p.penalized?'<span class="lp-pen">⚠ PEN</span>':'';
  const tm=p.team&&teamMap.has(p.team)?`<span class="lp-team" style="background:${teamMap.get(p.team).color}22;color:${teamMap.get(p.team).color}">${esc(teamMap.get(p.team).name)}</span>`:'';
  return `<div class="lp"><div class="lp-dot" style="background:${p.color};box-shadow:0 0 5px ${p.color}${p.idle?'44':''};opacity:${p.idle?'.4':'1'}"></div><div class="lp-name" style="opacity:${p.idle?'.4':'1'}">${esc(p.name)}</div>${tm}${idle}${pen}<div class="lp-actions"><button class="lp-btn pen" onclick="penPlayer('${p.id}')" title="10s penalty">⚠</button><button class="lp-btn" onclick="kickP('${p.id}')" title="Kick">✕</button></div></div>`;
}

function toggleLock(){if(lobbyData.teamsLocked)host.unlockTeams();else host.lockTeams();}
function penTeam(tid){host.penalizeTeam(tid);}
function penPlayer(pid){host.penalizePlayer(pid);}
function kickP(pid){host.kickPlayer(pid);}

function setTmr(s,el){host.setTimer(s);document.querySelectorAll('#timerBtns .tbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function setSnd(t,el){host.setSoundTheme(t);document.querySelectorAll('#sndBtns .tbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');}

function doArm(){
  host.armRound();if(sndOn)playSound('arm');
  document.getElementById('btnArm').style.display='none';document.getElementById('btnRst').style.display='block';
  document.getElementById('idleMsg').style.display='none';document.getElementById('waitBadge').style.display='block';
  document.getElementById('firstBox').style.display='none';document.getElementById('saBtn').style.display='none';
  document.getElementById('bList').classList.remove('open');document.getElementById('bList').innerHTML='';
  saOpen=false;if(timerInt)clearInterval(timerInt);
}

function doReset(){
  host.resetRound();
  document.getElementById('btnArm').style.display='block';document.getElementById('btnRst').style.display='none';
  document.getElementById('idleMsg').style.display='block';document.getElementById('waitBadge').style.display='none';
  document.getElementById('firstBox').style.display='none';document.getElementById('saBtn').style.display='none';
  document.getElementById('bList').classList.remove('open');document.getElementById('bList').innerHTML='';
  saOpen=false;if(timerInt)clearInterval(timerInt);
}

function showFirst(msg){
  if(sndOn)playSound('buzz');
  document.getElementById('waitBadge').style.display='none';
  const el=document.getElementById('firstBox');el.style.display='block';el.style.borderColor=msg.color;
  const ti=msg.team&&lobbyData.teams.find(t=>t.id===msg.team);
  const tl=ti?`<div class="f-team" style="color:${ti.color}">${esc(ti.name)}</div>`:'';
  let rem=msg.timerDuration;
  el.innerHTML=`<div class="f-label">🏆 First Buzzer</div>${tl}<div class="f-name" style="color:${msg.color};text-shadow:0 0 16px ${msg.color}">${esc(msg.name)}</div><div class="f-timer" id="cd" style="color:${msg.color}">${rem.toFixed(1)}s</div><div class="f-tlabel">Answer Time</div>`;
  if(timerInt)clearInterval(timerInt);
  const t0=Date.now();
  timerInt=setInterval(()=>{
    rem=Math.max(0,msg.timerDuration-(Date.now()-t0)/1000);
    const cd=document.getElementById('cd');
    if(cd){cd.textContent=rem.toFixed(1)+'s';if(rem<=0){clearInterval(timerInt);cd.style.opacity='.3';}}
  },50);
}

function showBuzzList(buzzes){
  if(buzzes.length>1){document.getElementById('saBtn').style.display='block';document.getElementById('saBtn').textContent=(saOpen?'▲ Hide':'▼ See all')+` buzzes (${buzzes.length})`;}
  document.getElementById('bList').innerHTML=buzzes.slice(1).map(b=>
    `<div class="bitem"><div class="b-ord" style="color:${b.color}">#${b.order}</div><div class="b-dot" style="background:${b.color}"></div><div class="b-name">${esc(b.name)}</div><div class="b-gap">+${b.gap}ms</div></div>`
  ).join('');
}

function toggleSA(){
  saOpen=!saOpen;document.getElementById('bList').classList.toggle('open',saOpen);
  const btn=document.getElementById('saBtn'),n=btn.textContent.match(/\(\d+\)/)?.[0]||'';
  btn.textContent=(saOpen?'▲ Hide':'▼ See all')+` buzzes ${n}`;
}
</script>
</body>
